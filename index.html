<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Favicon & Icons ── -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ── PWA ── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0D1F12" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="msapplication-TileColor" content="#0D1F12" />

    <!-- ── SEO : Primary ── -->
    <title>HOMECI — Immobilier Vérifié en Côte d'Ivoire</title>
    <meta name="description" content="HOMECI — Plateforme immobilière certifiée par notaire en Côte d'Ivoire. Trouvez des biens vérifiés à louer ou à acheter à Abidjan, Yamoussoukro, Bouaké et partout en CI." />
    <meta name="keywords" content="immobilier, Côte d'Ivoire, location, vente, maison, appartement, terrain, notaire, certifié, Abidjan, HOMECI" />
    <meta name="author" content="HOMECI" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://homeci.ci/" />

    <!-- ── SEO : Open Graph (Facebook, LinkedIn, WhatsApp) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="HOMECI" />
    <meta property="og:title" content="HOMECI — Immobilier Vérifié en Côte d'Ivoire" />
    <meta property="og:description" content="Trouvez des biens immobiliers certifiés par notaire. Location et vente de maisons, appartements et terrains en Côte d'Ivoire." />
    <meta property="og:url" content="https://homeci.ci/" />
    <meta property="og:image" content="https://homeci.ci/favicon-512x512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="fr_CI" />

    <!-- ── SEO : Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HOMECI — Immobilier Vérifié en Côte d'Ivoire" />

    <meta name="twitter:image" content="https://homeci.ci/favicon-512x512.png" />

    <!-- ── Structured Data (JSON-LD) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RealEstateAgent",
      "name": "HOMECI",
      "url": "https://homeci.ci",
      "logo": "https://homeci.ci/favicon-512x512.png",
      "description": "Plateforme immobilière certifiée par notaire en Côte d'Ivoire. Location et vente de biens vérifiés.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Abidjan",
        "addressCountry": "CI"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Côte d'Ivoire"
      },
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- ── Service Worker Registration ── -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
